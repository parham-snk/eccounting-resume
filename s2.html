<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let timer = setTimeout(() => {
            console.log("expired!")
        }, 2000);
        window.onmousemove=()=>clearTimeout(timer)
        window.onmouseout=()=>timer=setTimeout(() => {
            console.log("expired!")
        }, 2000);
    </script>
</head>
